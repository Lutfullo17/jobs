services:
  app:
    build: .
    container_name: jobify-app
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app

  celery-worker:
    build: .
    container_name: jobify-celery-worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info -Q celery
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - ./:/app

  db:
    image: postgres:16
    container_name: jobify-db
    environment:
      POSTGRES_DB: jobify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: jobify-redis
    # Windows: netsh excludedportrange ichida 6356-6455 (6379/6380 shu yerda). Tashqi portni bundan tashqariga qo'ying.
    # Tashqi ulanish: localhost:6500 (ichki servislar baribir redis:6379).
    ports:
      - "6500:6379"

volumes:
  pg_data:
